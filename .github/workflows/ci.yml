name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run --with 'ruff>=0.1' ruff check .

      - name: Ruff (format check)
        run: uv run --with 'ruff>=0.1' ruff format --check .

      - name: Mypy
        run: uv run --with 'mypy>=1.7' --with 'types-PyYAML' mypy src/forgestack

      - name: Pytest
        run: uv run --with 'pytest>=7.4' --with 'pytest-asyncio>=0.21' pytest -q
